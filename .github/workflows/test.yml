name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install "numpy>=1.21" "scipy>=1.7" matplotlib

      - name: Unit tests (cross-branch window selection)
        run: python test_cross_guard.py

      - name: Regression baselines (all 9 curves)
        run: python scan_all_curves.py
